// ─── RESPONSIVE HOOK ─────────────────────────────────────────────
function useResponsive() {
  const [width, setWidth] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(() => {
    const onResize = () => setWidth(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return { isMobile: width < 768, isTablet: width >= 768 && width < 1024, isDesktop: width >= 1024, width };
}

// ─── 3D SCENE (OPTIMIZED) ────────────────────────────────────────
function ThreeDScene({ compact = false }) {
  const mountRef = useRef(null);
  useEffect(() => {
    if (!mountRef.current) return;
    const container = mountRef.current;
    const w = container.clientWidth; const h = container.clientHeight;
    if (w === 0 || h === 0) return;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(compact ? 55 : 50, w / h, 0.1, 1000);
    camera.position.set(0, 2, compact ? 9 : 8); camera.lookAt(0, 0, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const pl1 = new THREE.PointLight(0xff7a59, 2, 20); pl1.position.set(3, 4, 3); scene.add(pl1);
    const pl2 = new THREE.PointLight(0x00bda5, 1.5, 20); pl2.position.set(-3, 2, -3); scene.add(pl2);
    const group = new THREE.Group(); scene.add(group);
    const ringColors = [0x0091ae, 0x00bda5, 0xff7a59, 0xff5c35, 0x00bda5];
    const funnelRings = [];
    for (let i = 0; i < 5; i++) {
      const geo = new THREE.TorusGeometry(2.5 - i * 0.35, 0.08, 16, 64);
      const mat = new THREE.MeshPhysicalMaterial({ color: ringColors[i], metalness: 0.7, roughness: 0.2, transparent: true, opacity: 0.85, emissive: ringColors[i], emissiveIntensity: 0.3 });
      const ring = new THREE.Mesh(geo, mat); ring.position.y = 1.5 - i * 0.75; ring.rotation.x = Math.PI / 2;
      group.add(ring); funnelRings.push(ring);
    }
    const pCount = compact ? 100 : 200;
    const pGeo = new THREE.BufferGeometry();
    const pos = new Float32Array(pCount * 3); const cols = new Float32Array(pCount * 3); const vels = [];
    for (let i = 0; i < pCount; i++) {
      const a = Math.random() * Math.PI * 2; const r = 0.5 + Math.random() * 3;
      pos[i*3] = Math.cos(a)*r; pos[i*3+1] = 3 - Math.random()*5; pos[i*3+2] = Math.sin(a)*r;
      const c = new THREE.Color(ringColors[Math.floor(Math.random()*ringColors.length)]);
      cols[i*3]=c.r; cols[i*3+1]=c.g; cols[i*3+2]=c.b;
      vels.push({vx:(Math.random()-0.5)*0.01, vy:-0.005-Math.random()*0.01, vz:(Math.random()-0.5)*0.01});
    }
    pGeo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    pGeo.setAttribute("color", new THREE.BufferAttribute(cols, 3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({size:0.04, vertexColors:true, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending}));
    group.add(particles);
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.4,32,32), new THREE.MeshPhysicalMaterial({color:0xff7a59,metalness:0.9,roughness:0.1,transparent:true,opacity:0.6,emissive:0xff7a59,emissiveIntensity:0.8}));
    sphere.position.y = -1.8; group.add(sphere);
    let animId; const clock = new THREE.Clock();
    const animate = () => {
      animId = requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      group.rotation.y = t * 0.15;
      funnelRings.forEach((ring,i) => { ring.rotation.z = t*(0.2+i*0.05); ring.position.y = (1.5-i*0.75)+Math.sin(t*0.8+i*0.5)*0.08; ring.material.emissiveIntensity = 0.3+Math.sin(t*2+i)*0.15; });
      const p = particles.geometry.attributes.position.array;
      for (let i=0;i<pCount;i++) {
        p[i*3]+=vels[i].vx; p[i*3+1]+=vels[i].vy; p[i*3+2]+=vels[i].vz;
        if (p[i*3+1]<-3) { const a=Math.random()*Math.PI*2; const r=1+Math.random()*2.5; p[i*3]=Math.cos(a)*r; p[i*3+1]=3; p[i*3+2]=Math.sin(a)*r; }
      }
      particles.geometry.attributes.position.needsUpdate = true;
      sphere.scale.setScalar(1+Math.sin(t*3)*0.1); sphere.material.emissiveIntensity = 0.8+Math.sin(t*2)*0.3;
      pl1.position.x = Math.cos(t*0.5)*4; pl1.position.z = Math.sin(t*0.5)*4;
      renderer.render(scene, camera);
    };
    animate();
    const onResize = () => { const nw=container.clientWidth; const nh=container.clientHeight; if(!nw||!nh)return; camera.aspect=nw/nh; camera.updateProjectionMatrix(); renderer.setSize(nw,nh); };
    window.addEventListener("resize", onResize);
    return () => { window.removeEventListener("resize", onResize); cancelAnimationFrame(animId); renderer.dispose(); if(container.contains(renderer.domElement)) container.removeChild(renderer.domElement); };
  }, [compact]);
  return <div ref={mountRef} style={{width:"100%",height:"100%",position:"absolute",top:0,left:0}} />;
}

// ─── SVG CHARTS ──────────────────────────────────────────────────
function Sparkline({ data, color = HUBSPOT_ORANGE, width = 120, height = 40 }) {
  const max=Math.max(...data); const min=Math.min(...data); const range=max-min||1;
  const pts = data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-min)/range)*height}`).join(" ");
  const gid = `g-${color.replace("#","")}-${Math.random().toString(36).slice(2,6)}`;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`0,${height} ${pts} ${width},${height}`} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function BarChart({ data, width=500, height=200 }) {
  const maxVal = Math.max(...data.map(d=>Math.max(d.leads,d.deals*5,d.revenue)));
  const bW = width/data.length;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height+30}`} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i) => { const x=i*bW+bW*0.1; const b=bW*0.25; return (
        <g key={i}>
          <rect x={x} y={height-(d.leads/maxVal)*height} width={b} height={(d.leads/maxVal)*height} fill={ACCENT_BLUE} opacity="0.8" rx="2"/>
          <rect x={x+b+2} y={height-((d.deals*5)/maxVal)*height} width={b} height={((d.deals*5)/maxVal)*height} fill={HUBSPOT_ORANGE} opacity="0.8" rx="2"/>
          <rect x={x+(b+2)*2} y={height-(d.revenue/maxVal)*height} width={b} height={(d.revenue/maxVal)*height} fill={ACCENT_TEAL} opacity="0.8" rx="2"/>
          <text x={x+bW*0.35} y={height+18} textAnchor="middle" fill="#64748b" fontSize="11" fontFamily="inherit">{d.month}</text>
        </g>
      );})}
    </svg>
  );
}

                  <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center"}}>
                    <span style={{padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:600,background:`${statusColor(c.status)}15`,color:statusColor(c.status),border:`1px solid ${statusColor(c.status)}30`}}>{c.status}</span>
                    <span style={{fontSize:11,color:"#64748b",fontFamily:"'JetBrains Mono', monospace"}}>Score: {c.score}</span>
                  </div>
                </div>
                <span style={{color:HUBSPOT_ORANGE,fontSize:12,fontWeight:600}}>→</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  const SECTIONS = {overview:renderOverview,pipeline:renderPipeline,hubs:renderHubs,workflows:renderWorkflows,integrations:renderIntegrations,contacts:renderContacts};

  // ─── ROOT RENDER ───────────────────────────────────────────────
  return (
    <div style={{fontFamily:"'Outfit', 'DM Sans', sans-serif",background:`linear-gradient(145deg, ${BG_DARK} 0%, #0F172A 50%, #0B1120 100%)`,minHeight:"100vh",color:"#E2E8F0",display:"flex",flexDirection:isMobile?"column":"row",position:"relative",overflow:"hidden"}}>
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",opacity:0.03,backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`}}/>
      {!isMobile && <>
        <div style={{position:"fixed",width:300,height:300,borderRadius:"50%",background:`radial-gradient(circle,${HUBSPOT_ORANGE}15 0%,transparent 70%)`,left:"60%",top:"10%",pointerEvents:"none",zIndex:0,filter:"blur(40px)"}}/>
        <div style={{position:"fixed",width:300,height:300,borderRadius:"50%",background:`radial-gradient(circle,${ACCENT_TEAL}15 0%,transparent 70%)`,left:"20%",top:"60%",pointerEvents:"none",zIndex:0,filter:"blur(40px)"}}/>
        <div style={{position:"fixed",width:300,height:300,borderRadius:"50%",background:`radial-gradient(circle,${ACCENT_BLUE}15 0%,transparent 70%)`,left:"80%",top:"70%",pointerEvents:"none",zIndex:0,filter:"blur(40px)"}}/>
      </>}

      {/* DESKTOP SIDEBAR */}
      {!isMobile && (
        <div style={{width:72,minHeight:"100vh",background:"rgba(15,23,42,0.95)",borderRight:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 0",zIndex:10,position:"relative",backdropFilter:"blur(20px)"}}>
          <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${HUBSPOT_ORANGE},${HUBSPOT_CORAL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:"#fff",marginBottom:32,boxShadow:`0 4px 20px ${HUBSPOT_ORANGE}33`}}>H</div>
          {NAV_ITEMS.map(n => (
            <div key={n.key} title={n.label} onClick={()=>switchNav(n.key)} style={{width:44,height:44,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginBottom:8,fontSize:18,transition:"all 0.3s cubic-bezier(0.4,0,0.2,1)",background:activeNav===n.key?`${HUBSPOT_ORANGE}15`:"transparent",color:activeNav===n.key?HUBSPOT_ORANGE:"#64748b",border:activeNav===n.key?`1px solid ${HUBSPOT_ORANGE}30`:"1px solid transparent",boxShadow:activeNav===n.key?`0 0 20px ${HUBSPOT_ORANGE}15`:"none"}}>{n.icon}</div>
          ))}
          <div style={{marginTop:"auto",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#334155,#1e293b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:HUBSPOT_ORANGE,border:`1px solid ${HUBSPOT_ORANGE}30`}}>R</div>
            <div style={{fontSize:8,color:"#475569",textAlign:"center",lineHeight:1.2,maxWidth:60}}>Rounak</div>
          </div>
        </div>
      )}

      {/* MOBILE TOP BAR */}
      {isMobile && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:"rgba(15,23,42,0.95)",borderBottom:"1px solid rgba(255,255,255,0.06)",zIndex:20,position:"sticky",top:0,backdropFilter:"blur(20px)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${HUBSPOT_ORANGE},${HUBSPOT_CORAL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#fff",boxShadow:`0 2px 12px ${HUBSPOT_ORANGE}33`}}>H</div>
            <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{TITLES[activeNav]}</div>
          </div>
          <div style={{fontSize:11,color:"#64748b",background:GLASS,padding:"6px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)"}}>{time.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</div>
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{flex:1,padding:isMobile?"16px 14px 100px 14px":isTablet?"20px 24px":"24px 32px",overflowY:"auto",position:"relative",zIndex:5,maxHeight:isMobile?"unset":"100vh"}}>
        {!isMobile && (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
            <div>
              <div style={{fontSize:isTablet?22:28,fontWeight:700,letterSpacing:"-0.5px",background:"linear-gradient(135deg,#fff 0%,#94a3b8 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{TITLES[activeNav]}</div>
              <div style={{fontSize:13,color:"#64748b",marginTop:4}}>{SUBS[activeNav]}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{fontSize:13,color:"#64748b",background:GLASS,padding:"8px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",backdropFilter:"blur(10px)"}}>{time.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} · {time.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</div>
            </div>
          </div>
        )}
        {isMobile && <div style={{fontSize:12,color:"#64748b",marginBottom:14,lineHeight:1.4}}>{SUBS[activeNav]}</div>}
        {SECTIONS[activeNav]?.()}

        {/* FOOTER WITH CREDITS */}
        <div style={{marginTop:40,padding:"16px 0",borderTop:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:11,color:"#334155"}}>
            Engineered by <span style={{color:HUBSPOT_ORANGE,fontWeight:700}}>Rounak</span> · HubSpot Command Center v2.0
          </div>
          <div style={{fontSize:10,color:"#1E293B"}}>NexaTech Solutions · Enterprise CRM Implementation</div>
        </div>
      </div>

      {/* MOBILE BOTTOM NAV */}
      {isMobile && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:30,display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 4px 18px 4px",background:"rgba(11,15,26,0.95)",borderTop:"1px solid rgba(255,255,255,0.08)",backdropFilter:"blur(24px)"}}>
          {NAV_ITEMS.map(n => (
            <div key={n.key} onClick={()=>switchNav(n.key)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"6px 6px",borderRadius:10,transition:"all 0.2s",background:activeNav===n.key?`${HUBSPOT_ORANGE}12`:"transparent"}}>
              <span style={{fontSize:16,color:activeNav===n.key?HUBSPOT_ORANGE:"#64748b",transition:"color 0.2s"}}>{n.icon}</span>
              <span style={{fontSize:8,fontWeight:600,letterSpacing:"0.03em",color:activeNav===n.key?HUBSPOT_ORANGE:"#475569",transition:"color 0.2s"}}>{n.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HubSpotCommandCenter));
  </script>
</body>
</html>
