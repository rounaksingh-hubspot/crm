// ─── RESPONSIVE HOOK ─────────────────────────────────────────────
function useResponsive() {
  const [width, setWidth] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(() => {
    const onResize = () => setWidth(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return { isMobile: width < 768, isTablet: width >= 768 && width < 1024, isDesktop: width >= 1024, width };
}

// ─── 3D SCENE (OPTIMIZED) ────────────────────────────────────────
function ThreeDScene({ compact = false }) {
  const mountRef = useRef(null);
  useEffect(() => {
    if (!mountRef.current) return;
    const container = mountRef.current;
    const w = container.clientWidth; const h = container.clientHeight;
    if (w === 0 || h === 0) return;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(compact ? 55 : 50, w / h, 0.1, 1000);
    camera.position.set(0, 2, compact ? 9 : 8); camera.lookAt(0, 0, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const pl1 = new THREE.PointLight(0xff7a59, 2, 20); pl1.position.set(3, 4, 3); scene.add(pl1);
    const pl2 = new THREE.PointLight(0x00bda5, 1.5, 20); pl2.position.set(-3, 2, -3); scene.add(pl2);
    const group = new THREE.Group(); scene.add(group);
    const ringColors = [0x0091ae, 0x00bda5, 0xff7a59, 0xff5c35, 0x00bda5];
    const funnelRings = [];
    for (let i = 0; i < 5; i++) {
      const geo = new THREE.TorusGeometry(2.5 - i * 0.35, 0.08, 16, 64);
      const mat = new THREE.MeshPhysicalMaterial({ color: ringColors[i], metalness: 0.7, roughness: 0.2, transparent: true, opacity: 0.85, emissive: ringColors[i], emissiveIntensity: 0.3 });
      const ring = new THREE.Mesh(geo, mat); ring.position.y = 1.5 - i * 0.75; ring.rotation.x = Math.PI / 2;
      group.add(ring); funnelRings.push(ring);
    }
    const pCount = compact ? 100 : 200;
    const pGeo = new THREE.BufferGeometry();
    const pos = new Float32Array(pCount * 3); const cols = new Float32Array(pCount * 3); const vels = [];
    for (let i = 0; i < pCount; i++) {
      const a = Math.random() * Math.PI * 2; const r = 0.5 + Math.random() * 3;
      pos[i*3] = Math.cos(a)*r; pos[i*3+1] = 3 - Math.random()*5; pos[i*3+2] = Math.sin(a)*r;
      const c = new THREE.Color(ringColors[Math.floor(Math.random()*ringColors.length)]);
      cols[i*3]=c.r; cols[i*3+1]=c.g; cols[i*3+2]=c.b;
      vels.push({vx:(Math.random()-0.5)*0.01, vy:-0.005-Math.random()*0.01, vz:(Math.random()-0.5)*0.01});
    }
    pGeo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    pGeo.setAttribute("color", new THREE.BufferAttribute(cols, 3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({size:0.04, vertexColors:true, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending}));
    group.add(particles);
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.4,32,32), new THREE.MeshPhysicalMaterial({color:0xff7a59,metalness:0.9,roughness:0.1,transparent:true,opacity:0.6,emissive:0xff7a59,emissiveIntensity:0.8}));
    sphere.position.y = -1.8; group.add(sphere);
    let animId; const clock = new THREE.Clock();
    const animate = () => {
      animId = requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      group.rotation.y = t * 0.15;
      funnelRings.forEach((ring,i) => { ring.rotation.z = t*(0.2+i*0.05); ring.position.y = (1.5-i*0.75)+Math.sin(t*0.8+i*0.5)*0.08; ring.material.emissiveIntensity = 0.3+Math.sin(t*2+i)*0.15; });
      const p = particles.geometry.attributes.position.array;
      for (let i=0;i<pCount;i++) {
        p[i*3]+=vels[i].vx; p[i*3+1]+=vels[i].vy; p[i*3+2]+=vels[i].vz;
        if (p[i*3+1]<-3) { const a=Math.random()*Math.PI*2; const r=1+Math.random()*2.5; p[i*3]=Math.cos(a)*r; p[i*3+1]=3; p[i*3+2]=Math.sin(a)*r; }
      }
      particles.geometry.attributes.position.needsUpdate = true;
      sphere.scale.setScalar(1+Math.sin(t*3)*0.1); sphere.material.emissiveIntensity = 0.8+Math.sin(t*2)*0.3;
      pl1.position.x = Math.cos(t*0.5)*4; pl1.position.z = Math.sin(t*0.5)*4;
      renderer.render(scene, camera);
    };
    animate();
    const onResize = () => { const nw=container.clientWidth; const nh=container.clientHeight; if(!nw||!nh)return; camera.aspect=nw/nh; camera.updateProjectionMatrix(); renderer.setSize(nw,nh); };
    window.addEventListener("resize", onResize);
    return () => { window.removeEventListener("resize", onResize); cancelAnimationFrame(animId); renderer.dispose(); if(container.contains(renderer.domElement)) container.removeChild(renderer.domElement); };
  }, [compact]);
  return <div ref={mountRef} style={{width:"100%",height:"100%",position:"absolute",top:0,left:0}} />;
}

// ─── SVG CHARTS ──────────────────────────────────────────────────
function Sparkline({ data, color = HUBSPOT_ORANGE, width = 120, height = 40 }) {
  const max=Math.max(...data); const min=Math.min(...data); const range=max-min||1;
  const pts = data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-min)/range)*height}`).join(" ");
  const gid = `g-${color.replace("#","")}-${Math.random().toString(36).slice(2,6)}`;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`0,${height} ${pts} ${width},${height}`} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function BarChart({ data, width=500, height=200 }) {
  const maxVal = Math.max(...data.map(d=>Math.max(d.leads,d.deals*5,d.revenue)));
  const bW = width/data.length;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height+30}`} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i) => { const x=i*bW+bW*0.1; const b=bW*0.25; return (
        <g key={i}>
          <rect x={x} y={height-(d.leads/maxVal)*height} width={b} height={(d.leads/maxVal)*height} fill={ACCENT_BLUE} opacity="0.8" rx="2"/>
          <rect x={x+b+2} y={height-((d.deals*5)/maxVal)*height} width={b} height={((d.deals*5)/maxVal)*height} fill={HUBSPOT_ORANGE} opacity="0.8" rx="2"/>
          <rect x={x+(b+2)*2} y={height-(d.revenue/maxVal)*height} width={b} height={(d.revenue/maxVal)*height} fill={ACCENT_TEAL} opacity="0.8" rx="2"/>
          <text x={x+bW*0.35} y={height+18} textAnchor="middle" fill="#64748b" fontSize="11" fontFamily="inherit">{d.month}</text>
        </g>
      );})}
    </svg>
  );
}

            <div style={{fontSize:11,color:"#64748b",fontFamily:"'JetBrains Mono', monospace",marginBottom:4}}>{deal.id}</div>
            <div style={{fontSize:isMobile?22:28,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>{deal.company}</div>
            <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{deal.contact} · {deal.domain}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:isMobile?28:36,fontWeight:800,color:"#fff",fontFamily:"'JetBrains Mono', monospace"}}>{deal.value}</div>
            <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:600,background:`${stageColor(deal.stage)}15`,color:stageColor(deal.stage),border:`1px solid ${stageColor(deal.stage)}30`,marginTop:4}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:stageColor(deal.stage),boxShadow:`0 0 8px ${stageColor(deal.stage)}60`}}/>{deal.stage}
            </div>
          </div>
        </div>

        {/* STAGE PROGRESS BAR */}
        <div style={{marginTop:24,display:"flex",alignItems:"center",gap:0}}>
          {stages.map((s,i) => (
            <div key={s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:"100%",display:"flex",alignItems:"center"}}>
                <div style={{flex:1,height:4,background:i<=stageIndex?stageColor(deal.stage):"rgba(255,255,255,0.08)",borderRadius:i===0?"4px 0 0 4px":i===4?"0 4px 4px 0":"0",transition:"background 0.4s"}}/>
              </div>
              <div style={{fontSize:10,color:i<=stageIndex?stageColor(deal.stage):"#475569",fontWeight:i===stageIndex?700:400,marginTop:6,textAlign:"center",whiteSpace:"nowrap"}}>{isMobile?(s.slice(0,4)+"."): s}</div>
            </div>
          ))}
        </div>
      </div>

      {/* PROPERTIES + SIDEBAR GRID */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"2fr 1fr",gap:16,marginBottom:20}}>
        {/* LEFT: TABS AREA */}
        <div>
          {/* TAB BAR */}
          <div style={{display:"flex",gap:0,marginBottom:16,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:4,border:"1px solid rgba(255,255,255,0.06)"}}>
            {[{key:"activity",label:"Activity"},{key:"notes",label:"Notes"},{key:"emails",label:"Emails"}].map(t=>(
              <button key={t.key} onClick={()=>setActiveTab(t.key)} style={{
                flex:1,padding:"10px 0",borderRadius:10,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",
                fontFamily:"inherit",transition:"all 0.2s",
                background:activeTab===t.key?`${HUBSPOT_ORANGE}15`:"transparent",
                color:activeTab===t.key?HUBSPOT_ORANGE:"#64748b",
              }}>{t.label}</button>
            ))}
          </div>

          {/* ACTIVITY TIMELINE */}
          {activeTab === "activity" && (
            <div style={crd}>
              <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:20}}>Activity Timeline</div>
              {deal.activities.map((act,i) => (
                <div key={i} style={{display:"flex",gap:14,marginBottom:i<deal.activities.length-1?0:0,paddingBottom:i<deal.activities.length-1?20:0,borderLeft:i<deal.activities.length-1?`2px solid ${activityColor(act.type)}20`:"2px solid transparent",marginLeft:14,paddingLeft:20,position:"relative"}}>
                  <div style={{position:"absolute",left:-11,top:0,width:22,height:22,borderRadius:"50%",background:`${activityColor(act.type)}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,border:`2px solid ${activityColor(act.type)}40`}}>{activityIcon(act.type)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#E2E8F0",marginBottom:4}}>{act.title}</div>
                    <div style={{display:"flex",gap:12,fontSize:11,color:"#64748b",flexWrap:"wrap"}}>
                      <span>{act.date} at {act.time}</span>
                      <span style={{color:"#94a3b8"}}>by {act.user}</span>
                      {act.duration && <span style={{color:ACCENT_TEAL}}>⏱ {act.duration}</span>}
                      {act.status && <span style={{padding:"1px 8px",borderRadius:10,fontSize:10,fontWeight:600,background:act.status==="completed"?"rgba(34,197,94,0.1)":"rgba(255,122,89,0.1)",color:act.status==="completed"?"#22C55E":HUBSPOT_ORANGE}}>{act.status}</span>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {activeTab === "notes" && (
            <div style={crd}>
              <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:12}}>Deal Notes</div>
              <div style={{padding:16,background:"rgba(167,139,250,0.06)",borderRadius:10,border:"1px solid rgba(167,139,250,0.15)",fontSize:13,color:"#CBD5E1",lineHeight:1.8}}>{deal.notes}</div>
              <div style={{marginTop:16}}>
                <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>Key properties noted:</div>
                {deal.activities.filter(a=>a.type==="note").map((n,i)=>(
                  <div key={i} style={{padding:12,background:GLASS,borderRadius:8,marginBottom:8,fontSize:12,color:"#94a3b8",border:"1px solid rgba(255,255,255,0.04)"}}>
                    <div style={{fontWeight:600,color:"#E2E8F0",marginBottom:4}}>📝 {n.date}</div>
                    {n.title}
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab === "emails" && (
            <div style={crd}>
              <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:12}}>Email History</div>
              {deal.activities.filter(a=>a.type==="email").map((em,i)=>(
                <div key={i} style={{padding:14,background:GLASS,borderRadius:10,marginBottom:10,border:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"all 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=`${ACCENT_BLUE}40`}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.04)"}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}>
                    <span style={{fontSize:13,fontWeight:600,color:"#E2E8F0"}}>✉️ {em.title}</span>
                    <span style={{fontSize:11,color:"#64748b"}}>{em.date}</span>
                  </div>
                  <div style={{fontSize:11,color:"#64748b"}}>Sent by {em.user} at {em.time}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* RIGHT SIDEBAR: DEAL PROPERTIES */}
        <div>
          <div style={{...crd,marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:16}}>Deal Information</div>
            {[
              ["Deal Owner", deal.owner],
              ["Deal Type", deal.type],
              ["Pipeline", "Sales Pipeline"],
              ["Close Date", deal.closeDate],
              ["Create Date", deal.createDate],
              ["Lead Source", deal.source],
            ].map(([label,val],i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<5?"1px solid rgba(255,255,255,0.04)":"none",fontSize:12}}>
                <span style={{color:"#64748b"}}>{label}</span>
                <span style={{color:"#E2E8F0",fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{val}</span>
              </div>
            ))}
          </div>

          <div style={{...crd,marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:16}}>Contact Details</div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,${HUBSPOT_ORANGE},${HUBSPOT_CORAL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff"}}>{deal.contact.charAt(0)}</div>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:"#fff"}}>{deal.contact}</div>
                <div style={{fontSize:11,color:"#64748b"}}>{deal.company}</div>
              </div>
            </div>
            {[
              ["Email", deal.email],
              ["Phone", deal.phone],
              ["Domain", deal.domain],
            ].map(([label,val],i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<2?"1px solid rgba(255,255,255,0.04)":"none",fontSize:12}}>
                <span style={{color:"#64748b"}}>{label}</span>
                <span style={{color:ACCENT_BLUE,fontWeight:500}}>{val}</span>
              </div>
            ))}
          </div>

          <div style={crd}>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:16}}>Company Properties</div>
            {Object.entries(deal.properties).map(([key,val],i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<Object.entries(deal.properties).length-1?"1px solid rgba(255,255,255,0.04)":"none",fontSize:12}}>
                <span style={{color:"#64748b",textTransform:"capitalize"}}>{key.replace(/([A-Z])/g,' $1')}</span>
                <span style={{color:"#E2E8F0",fontWeight:500,textAlign:"right"}}>{val}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── WORKFLOW DETAIL VIEW ────────────────────────────────────────
function WorkflowDetailView({ workflow, onBack, isMobile }) {
  const crd = {background:BG_CARD,borderRadius:14,border:"1px solid rgba(255,255,255,0.06)",padding:isMobile?"16px":"20px 24px",backdropFilter:"blur(12px)"};
  const stepColor = (type) => ({trigger:"#EF4444",delay:"#F59E0B",email:ACCENT_BLUE,branch:"#A78BFA",action:ACCENT_TEAL}[type]||"#64748b");

  return (
    <div style={{animation:"fadeSlideIn 0.4s ease"}}>
      <style>{`@keyframes fadeSlideIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }`}</style>
      <BackButton onClick={onBack} label="Back to workflows" />

      {/* HEADER */}
      <div style={{...crd,marginBottom:20,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:`linear-gradient(90deg,${HUBSPOT_ORANGE},${ACCENT_TEAL})`}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16,paddingTop:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#64748b",fontFamily:"'JetBrains Mono', monospace",marginBottom:4}}>{workflow.id}</div>
            <div style={{fontSize:isMobile?20:24,fontWeight:800,color:"#fff"}}>{workflow.name}</div>
            <div style={{fontSize:13,color:"#94a3b8",marginTop:6,lineHeight:1.6}}>{workflow.description}</div>
          </div>
          <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"6px 16px",borderRadius:20,fontSize:12,fontWeight:700,background:workflow.status==="active"?"rgba(34,197,94,0.12)":"rgba(245,158,11,0.12)",color:workflow.status==="active"?"#22C55E":"#F59E0B",border:`1px solid ${workflow.status==="active"?"#22C55E30":"#F59E0B30"}`}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:workflow.status==="active"?"#22C55E":"#F59E0B",boxShadow:`0 0 8px ${workflow.status==="active"?"#22C55E":"#F59E0B"}60`}}/>{workflow.status.toUpperCase()}
          </span>
        </div>
        <div style={{display:"flex",gap:20,marginTop:16,flexWrap:"wrap",fontSize:12,color:"#64748b"}}>
          <span>Trigger: <span style={{color:HUBSPOT_ORANGE,fontWeight:600}}>{workflow.trigger}</span></span>
          <span>Goal: <span style={{color:ACCENT_TEAL,fontWeight:600}}>{workflow.goalCriteria}</span></span>
        </div>
      </div>

      {/* STATS ROW */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[
          {label:"Enrollment Rate",value:`${workflow.performance.enrollmentRate}%`,color:ACCENT_BLUE},
          {label:"Completion Rate",value:`${workflow.performance.completionRate}%`,color:ACCENT_TEAL},
          {label:"Conversion Rate",value:`${workflow.performance.conversionRate}%`,color:HUBSPOT_ORANGE},
          {label:"Avg. Time",value:workflow.performance.avgTimeToComplete,color:"#A78BFA"},
        ].map((s,i)=>(
          <div key={i} style={{...crd,textAlign:"center"}}>
            <div style={{fontSize:isMobile?20:26,fontWeight:800,color:s.color,fontFamily:"'JetBrains Mono', monospace"}}>{s.value}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* VISUAL WORKFLOW BUILDER */}
      <div style={{...crd,marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:24}}>Workflow Steps</div>
        <div style={{position:"relative"}}>
          {workflow.steps.map((step,i)=>(
            <div key={step.id} style={{display:"flex",alignItems:"flex-start",marginBottom:i<workflow.steps.length-1?0:0}}>
              {/* CONNECTOR LINE */}
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:40,flexShrink:0}}>
                <div style={{width:32,height:32,borderRadius:step.type==="branch"?8:"50%",background:`${stepColor(step.type)}18`,border:`2px solid ${stepColor(step.type)}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,zIndex:2}}>{step.icon}</div>
                {i<workflow.steps.length-1 && <div style={{width:2,height:isMobile?50:40,background:`linear-gradient(${stepColor(step.type)}40, ${stepColor(workflow.steps[i+1].type)}40)`}}/>}
              </div>
              {/* STEP CONTENT */}
              <div style={{flex:1,marginLeft:12,paddingBottom:i<workflow.steps.length-1?(isMobile?18:8):0}}>
                <div style={{padding:"12px 16px",borderRadius:10,background:GLASS,border:`1px solid ${stepColor(step.type)}20`,transition:"all 0.2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:"#E2E8F0"}}>{step.label}</div>
                      <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{step.desc}</div>
                    </div>
                    <span style={{fontSize:10,padding:"2px 10px",borderRadius:20,background:`${stepColor(step.type)}15`,color:stepColor(step.type),fontWeight:600,textTransform:"uppercase"}}>{step.type}</span>
                  </div>
                  {step.stats && (
                    <div style={{display:"flex",gap:isMobile?8:16,marginTop:10,flexWrap:"wrap"}}>
                      {[["Sent",step.stats.sent],["Opened",step.stats.opened],["Clicked",step.stats.clicked],["Open Rate",step.stats.rate]].map(([l,v],j)=>(
                        <div key={j} style={{fontSize:11}}>
                          <span style={{color:"#64748b"}}>{l}: </span>
                          <span style={{color:"#E2E8F0",fontWeight:600,fontFamily:"'JetBrains Mono', monospace"}}>{typeof v==="number"?v.toLocaleString():v}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {step.type==="branch" && (
                    <div style={{display:"flex",gap:12,marginTop:10}}>
                      <div style={{padding:"4px 10px",borderRadius:6,fontSize:11,background:"rgba(34,197,94,0.1)",color:"#22C55E",border:"1px solid #22C55E20"}}>✓ Yes → {step.yesPath}</div>
                      <div style={{padding:"4px 10px",borderRadius:6,fontSize:11,background:"rgba(239,68,68,0.1)",color:"#EF4444",border:"1px solid #EF444420"}}>✗ No → {step.noPath}</div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* METADATA */}
      <div style={{...crd}}>
        <div style={{display:"flex",gap:20,fontSize:12,color:"#64748b",flexWrap:"wrap"}}>
          <span>Created by: <span style={{color:"#E2E8F0",fontWeight:500}}>{workflow.createdBy}</span></span>
          <span>Last modified: <span style={{color:"#E2E8F0",fontWeight:500}}>{workflow.lastModified}</span></span>
          <span>Enrolled: <span style={{color:ACCENT_TEAL,fontWeight:600}}>{workflow.enrolled.toLocaleString()}</span></span>
          <span>Completed: <span style={{color:"#22C55E",fontWeight:600}}>{workflow.completed.toLocaleString()}</span></span>
        </div>
      </div>
    </div>
  );
}

// ─── INTEGRATION DETAIL VIEW ─────────────────────────────────────
function IntegrationDetailView({ integration, onBack, isMobile }) {
  const crd = {background:BG_CARD,borderRadius:14,border:"1px solid rgba(255,255,255,0.06)",padding:isMobile?"16px":"20px 24px",backdropFilter:"blur(12px)"};
  const sc = integration.status==="connected"?"#22C55E":integration.status==="warning"?"#F59E0B":"#EF4444";

  return (
    <div style={{animation:"fadeSlideIn 0.4s ease"}}>
      <style>{`@keyframes fadeSlideIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }`}</style>
      <BackButton onClick={onBack} label="Back to integrations" />

      {/* HEADER */}
      <div style={{...crd,marginBottom:20,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:`linear-gradient(90deg,${integration.color},${integration.color}66)`}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16,paddingTop:8}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{width:48,height:48,borderRadius:14,background:`${integration.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,border:`2px solid ${integration.color}40`}}>{integration.icon}</div>
            <div>
              <div style={{fontSize:isMobile?20:24,fontWeight:800,color:"#fff"}}>{integration.name}</div>
              <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{integration.description}</div>
            </div>
          </div>
          <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 16px",borderRadius:20,fontSize:12,fontWeight:700,background:`${sc}12`,color:sc,border:`1px solid ${sc}30`}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:sc,boxShadow:`0 0 8px ${sc}60`}}/>{integration.status.toUpperCase()}
          </span>
        </div>
      </div>

      {/* STATS ROW */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[
          {label:"Total Records",value:integration.stats.totalSynced,color:ACCENT_BLUE},
          {label:"Errors",value:integration.stats.errors.toString(),color:integration.stats.errors>0?"#EF4444":"#22C55E"},
          {label:"Last Full Sync",value:integration.stats.lastFullSync,color:ACCENT_TEAL},
          {label:"Frequency",value:integration.stats.syncFrequency,color:HUBSPOT_ORANGE},
        ].map((s,i)=>(
          <div key={i} style={{...crd,textAlign:"center"}}>
            <div style={{fontSize:isMobile?18:22,fontWeight:800,color:s.color,fontFamily:"'JetBrains Mono', monospace"}}>{s.value}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:16}}>
        {/* SYNC HISTORY */}
        <div style={crd}>
          <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:16}}>Sync History</div>
          {integration.syncHistory.map((s,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:i<integration.syncHistory.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#E2E8F0"}}>{s.action}</div>
                <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{s.time}</div>
              </div>
              <span style={{width:8,height:8,borderRadius:"50%",background:s.status==="success"?"#22C55E":s.status==="warning"?"#F59E0B":"#EF4444",boxShadow:`0 0 8px ${s.status==="success"?"#22C55E":s.status==="warning"?"#F59E0B":"#EF4444"}40`}}/>
            </div>
          ))}
        </div>

        {/* FIELD MAPPINGS */}
        <div style={crd}>
          <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:16}}>Field Mappings</div>
          {integration.fieldMappings.length > 0 ? integration.fieldMappings.map((fm,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",borderBottom:i<integration.fieldMappings.length-1?"1px solid rgba(255,255,255,0.04)":"none",fontSize:12}}>
              <span style={{flex:1,color:ACCENT_BLUE,fontWeight:600,fontFamily:"'JetBrains Mono', monospace",fontSize:11}}>{fm.hs}</span>
              <span style={{color:"#64748b",fontSize:16}}>
                {fm.direction==="bi"?"⇄":fm.direction.includes("→")?"→":"←"}
              </span>
              <span style={{flex:1,color:ACCENT_TEAL,fontWeight:600,fontFamily:"'JetBrains Mono', monospace",fontSize:11,textAlign:"right"}}>{fm.sf}</span>
            </div>
          )) : (
            <div style={{fontSize:13,color:"#64748b",textAlign:"center",padding:20}}>No active field mappings. Connect integration to configure.</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── DONUT CHART ────────────────────────────────────────────
function DonutChart({ data, size = 180 }) {
  const total = data.reduce((s, d) => s + d.pct, 0);
  let cumAngle = -90;
  const r = size / 2, innerR = r * 0.62, cx = r, cy = r;
  const arcs = data.map(d => {
    const angle = (d.pct / total) * 360;
    const startAngle = cumAngle;
    cumAngle += angle;
    const endAngle = cumAngle;
    const startRad = (startAngle * Math.PI) / 180;
    const endRad = (endAngle * Math.PI) / 180;
    const largeArc = angle > 180 ? 1 : 0;
    const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
    const x2 = cx + r * Math.cos(endRad), y2 = cy + r * Math.sin(endRad);
    const ix1 = cx + innerR * Math.cos(startRad), iy1 = cy + innerR * Math.sin(startRad);
    const ix2 = cx + innerR * Math.cos(endRad), iy2 = cy + innerR * Math.sin(endRad);
    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${innerR} ${innerR} 0 ${largeArc} 0 ${ix1} ${iy1} Z`;
    return { ...d, path };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {arcs.map((a, i) => <path key={i} d={a.path} fill={a.color} opacity="0.85" stroke={BG_DARK} strokeWidth="2"/>)}
      <circle cx={cx} cy={cy} r={innerR - 4} fill="none"/>
    </svg>
  );
}

// ─── MINI AREA CHART ────────────────────────────────────────
function AreaChart({ data, color = HUBSPOT_ORANGE, width = 200, height = 50, label }) {
  const max = Math.max(...data); const min = Math.min(...data); const range = max - min || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*width},${height - ((v-min)/range)*height}`).join(" ");
  const gid = `area-${color.replace("#","")}-${Math.random().toString(36).slice(2,6)}`;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.4"/><stop offset="100%" stopColor={color} stopOpacity="0.02"/></linearGradient></defs>
      <polygon points={`0,${height} ${pts} ${width},${height}`} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ─── HORIZONTAL BAR ─────────────────────────────────────────

  );
}

            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["Marketing Hub","Sales Hub","Service Hub","CMS Hub","Operations Hub"].map((h,i)=>(
              <span key={i} style={{padding:"2px 8px",borderRadius:6,fontSize:9,fontWeight:500,background:"rgba(255,255,255,0.02)",color:"#1E293B",border:"1px solid rgba(255,255,255,0.02)"}}>{h} ✓</span>
            ))}
          </div>
        </div>
      </div>

      {/* MOBILE BOTTOM NAV */}
      {isMobile && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:30,display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 4px 18px 4px",background:"rgba(11,15,26,0.95)",borderTop:"1px solid rgba(255,255,255,0.08)",backdropFilter:"blur(24px)"}}>
          {NAV_ITEMS.map(n => (
            <div key={n.key} onClick={()=>switchNav(n.key)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"6px 6px",borderRadius:10,transition:"all 0.2s",background:activeNav===n.key?`${HUBSPOT_ORANGE}12`:"transparent"}}>
              <span style={{fontSize:16,color:activeNav===n.key?HUBSPOT_ORANGE:"#64748b",transition:"color 0.2s"}}>{n.icon}</span>
              <span style={{fontSize:8,fontWeight:600,letterSpacing:"0.03em",color:activeNav===n.key?HUBSPOT_ORANGE:"#475569",transition:"color 0.2s"}}>{n.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HubSpotCommandCenter));
  </script>
</body>
</html>
